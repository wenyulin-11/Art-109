<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warm Home Menu</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a href="#" class="logo">Warm Home Menu</a>
      </div>
    </header>

    <main class="hero">
      <div class="container hero-card">
        <div class="hero-text">
          <p class="eyebrow">Warm Food Menu</p>
          <h1>Build your food menu with cards</h1>
          <p class="hero-copy">Paste an image URL, add category and description, then preview warm food cards instantly.</p>
        </div>
        <button class="primary-btn" id="scrollToForm">Add New Item</button>
      </div>
    </main>

    <section class="workspace">
      <div class="container work-grid">
        <div class="editor-panel">
          <h2>Item Editor</h2>
          <form id="itemForm">
            <div class="field">
              <label for="imageUrl">Image URL</label>
              <input id="imageUrl" name="imageUrl" type="text" placeholder="Paste a direct image link here" required />
              <p class="input-note">Use a direct image URL. If the URL points to a valid image, it will display.</p>
            </div>
            <div class="field">
              <label for="category">Category</label>
              <input id="category" name="category" type="text" placeholder="e.g. Breakfast, Dinner" required />
            </div>
            <div class="field">
              <label for="description">Description</label>
              <textarea id="description" name="description" rows="4" placeholder="Write a short description" required></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="primary-btn">Save Item</button>
              <button type="button" class="secondary-btn" id="resetBtn">Reset</button>
            </div>
          </form>
        </div>

        <div class="preview-panel">
          <h2>Card Preview</h2>
          <div id="cards" class="cards"></div>
        </div>
      </div>
    </section>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
